<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>TEST: MapLibre HERNÍ režim — Šimmy v Těšíně</title>
  <link href="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.css" rel="stylesheet">
  <style>
    html,body{margin:0;height:100%;background:#1a1a2e;overflow:hidden;font-family:system-ui,sans-serif;-webkit-user-select:none;user-select:none}
    #map{position:absolute;inset:0}
    /* Šimmy je pevně uprostřed obrazovky (kamera ho sleduje) */
    #simmy{position:fixed;left:50%;top:50%;width:34px;height:auto;transform:translate(-50%,-86%);
      z-index:4;pointer-events:none;filter:drop-shadow(0 3px 3px rgba(0,0,0,.5))}
    #hud{position:fixed;left:8px;top:8px;z-index:5;background:rgba(8,8,16,.82);color:#fff;
      padding:9px 12px;border:2px solid #ffd23f;border-radius:10px;max-width:80%;font-size:13px;line-height:1.4}
    #hud b{color:#ffd23f}
    #joy{position:fixed;left:0;bottom:0;width:100%;height:55%;z-index:3}
    #eye{position:fixed;right:16px;bottom:120px;width:64px;height:64px;z-index:6;border-radius:50%;
      background:rgba(8,8,16,.78);border:2px solid #ffd23f;color:#ffd23f;font-size:30px;display:flex;
      align-items:center;justify-content:center;touch-action:none}
    #eye.act{background:#ffd23f;color:#1a1a2e}
    #eyehint{position:fixed;right:14px;bottom:188px;z-index:6;color:#ffd23f;font-size:11px;
      background:#000a;padding:2px 6px;border-radius:6px}
    #err{position:fixed;left:8px;bottom:8px;z-index:6;color:#ff6b6b;font:12px monospace;background:#000a;padding:4px 8px;border-radius:6px}
  </style>
</head>
<body>
  <div id="map"></div>
  <img id="simmy" src="assets/simmy_char.png" alt="Šimmy">
  <div id="hud"><b>HERNÍ režim (test)</b><br>Táhni dole = chození · WASD/šipky na PC.<br>Kamera sleduje Šimmyho reálným Těšínem.</div>
  <div id="joy"></div>
  <div id="eyehint">drž a táhni = otoč pohled</div>
  <div id="eye">👁</div>
  <div id="err"></div>
  <script src="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.js"></script>
  <script>
  const show = m => document.getElementById('err').textContent = m;
  try {
    const SPAWN = [18.6285, 49.7464];           // Český Těšín
    let lng = SPAWN[0], lat = SPAWN[1];
    const PITCH = 62, ZOOM = 18.7;  // víc 3D + blíž → svět větší vs Šimmy
    let bearing = 0;                // mění "oko" (otáčení pohledu)

    const map = new maplibregl.Map({
      container: 'map',
      style: 'https://tiles.openfreemap.org/styles/liberty',
      center: SPAWN, zoom: ZOOM, pitch: PITCH, bearing: bearing, maxPitch: 75,
      interactive: false,                        // kameru řídíme my (honící), ne uživatel
      attributionControl: true,
    });
    map.on('error', e => show('map: ' + (e&&e.error&&e.error.message||'?')));

    // ── Ovládání ──────────────────────────────────────────────
    const keys = {};
    addEventListener('keydown', e => keys[e.key.toLowerCase()] = true);
    addEventListener('keyup',   e => keys[e.key.toLowerCase()] = false);
    // plovoucí joystick (dotyk ve spodní části)
    let joy = null;   // {ox,oy,dx,dy}
    const jz = document.getElementById('joy');
    const tStart = e => { const t=e.changedTouches[0]; joy={ox:t.clientX,oy:t.clientY,dx:0,dy:0}; };
    const tMove  = e => { if(!joy)return; const t=e.changedTouches[0]; joy.dx=t.clientX-joy.ox; joy.dy=t.clientY-joy.oy; e.preventDefault(); };
    const tEnd   = () => joy=null;
    jz.addEventListener('touchstart',tStart,{passive:true});
    jz.addEventListener('touchmove',tMove,{passive:false});
    jz.addEventListener('touchend',tEnd); jz.addEventListener('touchcancel',tEnd);

    // "Oko" — drž a táhni = otoč kameru (koukni do jiné ulice); ťukni = srovnat na sever
    const eye = document.getElementById('eye');
    let eyeOn=false, eyeX=0, eyeMoved=0, eyeBase=0;
    eye.addEventListener('pointerdown', e=>{ eyeOn=true; eyeX=e.clientX; eyeMoved=0; eyeBase=bearing;
      eye.classList.add('act'); eye.setPointerCapture(e.pointerId); e.preventDefault(); e.stopPropagation(); });
    eye.addEventListener('pointermove', e=>{ if(!eyeOn)return; const dx=e.clientX-eyeX;
      eyeMoved=Math.max(eyeMoved,Math.abs(dx)); bearing=eyeBase+dx*0.6; e.preventDefault(); e.stopPropagation(); });
    const eyeUp = e=>{ if(!eyeOn)return; eyeOn=false; eye.classList.remove('act');
      if(e)e.stopPropagation(); };   // jen otáčení držením, žádné vycentrování
    eye.addEventListener('pointerup', eyeUp); eye.addEventListener('pointercancel', eyeUp);

    // ── Pohyb + honící kamera ─────────────────────────────────
    const SPEED = 11;                            // m/s (běh)
    const MLAT = 111320;
    const mlng = la => 111320 * Math.cos(la*Math.PI/180);
    const simmyEl = document.getElementById('simmy');
    let last = performance.now(), facing = 1;

    function loop(now){
      const dt = Math.min((now-last)/1000, 0.05); last = now;
      // vstup → směr (x=východ, y=sever; nahoře na obrazovce = sever)
      let ix=0, iy=0;
      if(keys['a']||keys['arrowleft'])ix-=1; if(keys['d']||keys['arrowright'])ix+=1;
      if(keys['w']||keys['arrowup'])iy+=1;   if(keys['s']||keys['arrowdown'])iy-=1;
      if(joy){ const L=Math.hypot(joy.dx,joy.dy); if(L>10){ ix+=joy.dx/L; iy-=joy.dy/L; } }
      const len=Math.hypot(ix,iy);
      if(len>0){
        ix/=len; iy/=len;
        if(ix>0.1)facing=1; else if(ix<-0.1)facing=-1;
        const d = SPEED*dt;
        // pohyb RELATIVNĚ ke kameře: "nahoru" = kam koukáš (po otočení okem)
        const th = bearing*Math.PI/180;
        const east  =  ix*Math.cos(th) + iy*Math.sin(th);
        const north = -ix*Math.sin(th) + iy*Math.cos(th);
        lat += (north*d)/MLAT;
        lng += (east*d)/mlng(lat);
        simmyEl.style.transform = `translate(-50%,-86%) scaleX(${facing})`;
      }
      // kamera sleduje hráče (instantně = plynulé sledování)
      map.jumpTo({ center:[lng,lat], zoom:ZOOM, pitch:PITCH, bearing });
      requestAnimationFrame(loop);
    }
    // ── Stylizace: z "mapy" → "kreslená realita" ──────────────
    function stylize(){
      // obloha + atmosféra
      try { map.setSky({ 'sky-color':'#8fc1ee','horizon-color':'#dfeaf4','fog-color':'#e9eef5',
        'sky-horizon-blend':0.55,'horizon-fog-blend':0.5 }); } catch(e){}
      // teplé stylizované 3D budovy (barva podle výšky)
      const col = ['interpolate',['linear'],
        ['coalesce',['get','render_height'],['get','height'],8],
        0,'#ead9c2', 8,'#dcc6a6', 18,'#cdb08c', 35,'#bd9c78', 70,'#a98866'];
      let done=false;
      ['building-3d','building-top','building'].forEach(id=>{
        if(map.getLayer(id)){ try{
          map.setPaintProperty(id,'fill-extrusion-color',col);
          map.setPaintProperty(id,'fill-extrusion-opacity',1);
          map.setPaintProperty(id,'fill-extrusion-vertical-gradient',true);
          done=true;
        }catch(e){} }
      });
      if(!done){ try{ map.addLayer({ id:'tst-3d', source:'openmaptiles','source-layer':'building',
        type:'fill-extrusion', minzoom:14, paint:{ 'fill-extrusion-color':col,
        'fill-extrusion-height':['coalesce',['get','render_height'],['get','height'],9],
        'fill-extrusion-base':['coalesce',['get','render_min_height'],['get','min_height'],0],
        'fill-extrusion-opacity':1 } }); }catch(e){} }
      // teplejší zem (pozadí) ať to není šedá mapa
      try{ if(map.getLayer('background')) map.setPaintProperty('background','background-color','#cfdcc4'); }catch(e){}
    }
    map.on('load', ()=>{ stylize(); new maplibregl.Marker({color:'#ff3b3b',scale:0.45}).setLngLat(SPAWN).addTo(map); requestAnimationFrame(loop); });
  } catch(e){ show('init: '+e.message); }
  </script>
</body>
</html>
