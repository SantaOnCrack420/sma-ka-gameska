<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#1a1a2e">
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="assets/apple-touch-icon.png">
  <title>GTA 7: Těšín City</title>
  <link href="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.css" rel="stylesheet">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@500;700&display=swap" rel="stylesheet">
  <style>
    html,body{margin:0;height:100%;background:#1a1a2e;overflow:hidden;font-family:system-ui,sans-serif;-webkit-user-select:none;user-select:none}
    #map{position:absolute;inset:0}
    /* FX overlay = NPC, hranolky, smažák, particly (kreslené přes 3D mapu) */
    #fx{position:fixed;inset:0;z-index:2;pointer-events:none}
    /* Šimmy je pevně uprostřed obrazovky (kamera ho sleduje).
       Explicitní šířka+výška (poměr 473:1017) — height:auto na iOS někdy = 0. */
    /* Šimmy = animovaný chodící sprite (simmy_walk.png = 8 snímků vedle sebe, každý 204×421).
       background-size:800% → 1 snímek; frame se přepíná přes background-position-x v JS. */
    #simmy{position:fixed;left:50%;top:50%;width:27px;height:56px;transform:translate(-50%,-88%);
      z-index:5;pointer-events:none;
      background-image:url(assets/simmy_walk.png);background-repeat:no-repeat;
      background-size:800% 100%;background-position:0% 0%;
      filter:drop-shadow(0 0 1px #fff) drop-shadow(0 0 1px #fff) drop-shadow(0 4px 4px rgba(0,0,0,.55))}
    #hud{position:fixed;left:8px;top:8px;z-index:5;background:rgba(8,8,16,.82);color:#fff;
      padding:8px 12px;border:2px solid #ffd23f;border-radius:10px;font-size:15px;line-height:1.5;font-weight:600}
    #hud b{color:#ffd23f}
    #joy{position:fixed;left:0;bottom:0;width:55%;height:55%;z-index:3}
    .btn{position:fixed;z-index:6;border-radius:50%;background:rgba(8,8,16,.78);
      border:2px solid #ffd23f;color:#ffd23f;display:flex;align-items:center;justify-content:center;
      touch-action:none;font-weight:700}
    #fire{right:18px;bottom:30px;width:88px;height:88px;font-size:38px}
    #fire:active,#fire.act{background:#ffd23f;color:#1a1a2e}
    #smaz{right:120px;bottom:46px;width:64px;height:64px;font-size:30px}
    #smaz.cd{opacity:.4}
    #eye{right:24px;bottom:140px;width:58px;height:58px;font-size:28px}
    #eye.act{background:#ffd23f;color:#1a1a2e}
    #hint{position:fixed;right:18px;bottom:204px;z-index:6;color:#ffd23f;font-size:11px;
      background:#000a;padding:2px 6px;border-radius:6px}
    #err{position:fixed;left:8px;bottom:34px;z-index:6;color:#ff6b6b;font:12px monospace;background:#000a;padding:4px 8px;border-radius:6px}

    /* mimo hru schovej herní prvky (HUD, joystick, tlačítka, Šimmy) */
    body:not(.playing) #hud, body:not(.playing) #joy, body:not(.playing) #hint,
    body:not(.playing) #eye, body:not(.playing) #smaz, body:not(.playing) #fire,
    body:not(.playing) #simmy{display:none!important}

    /* ── Overlaye (menu / nastavení / žebříček / nick / konec) ── */
    .overlay{position:fixed;inset:0;z-index:20;display:none;align-items:center;justify-content:center;
      padding:22px;box-sizing:border-box;
      background:radial-gradient(circle at 50% 30%, rgba(26,26,52,.55), rgba(6,6,14,.92));
      -webkit-backdrop-filter:blur(3px);backdrop-filter:blur(3px)}
    .overlay.show{display:flex;animation:fade .25s ease}
    @keyframes fade{from{opacity:0}to{opacity:1}}
    .panel{width:100%;max-width:360px;box-sizing:border-box;text-align:center;
      background:linear-gradient(180deg,#181a2e,#0d0e1a);border:2px solid #ffd23f;border-radius:20px;
      padding:22px 20px 18px;box-shadow:0 18px 50px rgba(0,0,0,.65)}
    .kicker{font:700 14px Oswald,sans-serif;letter-spacing:5px;color:#9aa3c7;margin-bottom:2px}
    .logo{font:700 40px/0.95 Oswald,sans-serif;color:#ffd23f;letter-spacing:1px;
      text-shadow:0 3px 0 #b8860b,0 5px 12px rgba(0,0,0,.6);margin:0}
    .sub{font:500 14px Oswald,sans-serif;color:#e7e7ef;margin:8px 0 4px;opacity:.92}
    .panel h2{font:700 24px Oswald,sans-serif;color:#ffd23f;margin:0 0 14px}
    /* MENU jako titulní obrazovka: hero artwork na pozadí, logo nahoře, tlačítka dole */
    #menu{flex-direction:column;justify-content:space-between;align-items:center;padding:0;
      background:#0d0e1a;-webkit-backdrop-filter:none;backdrop-filter:none}
    .heroImg{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;object-position:center}
    .heroScrim{position:absolute;inset:0;pointer-events:none;
      background:linear-gradient(180deg, rgba(8,8,18,.62) 0%, rgba(8,8,18,.05) 24%, rgba(8,8,18,0) 46%, rgba(8,8,18,.45) 74%, rgba(8,8,18,.92) 100%)}
    .menuTop{position:relative;z-index:2;width:100%;box-sizing:border-box;text-align:center;
      padding:calc(env(safe-area-inset-top,0px) + 26px) 16px 0}
    .menuBottom{position:relative;z-index:2;width:100%;max-width:340px;box-sizing:border-box;
      padding:0 20px calc(env(safe-area-inset-bottom,0px) + 22px)}
    .mbtn{display:block;width:100%;box-sizing:border-box;margin:9px 0;padding:14px;border-radius:13px;
      border:2px solid #3a3f63;background:#22253c;color:#fff;font:700 17px Oswald,sans-serif;
      cursor:pointer;-webkit-tap-highlight-color:transparent;transition:transform .05s}
    .mbtn:active{transform:scale(.97)}
    .mbtn.gold{background:linear-gradient(180deg,#ffe273,#ffc21f);color:#1a1a2e;border-color:#ffd23f;
      font-size:23px;padding:16px;box-shadow:0 6px 0 #c79318}
    .mbtn.gold:active{box-shadow:0 2px 0 #c79318;transform:translateY(3px)}
    .mrow{display:flex;gap:8px}
    .mrow .mbtn{flex:1;margin:9px 0;font-size:15px;padding:13px 8px}
    .nickline{font:500 13px Oswald,sans-serif;color:#cfd3e6;margin-top:12px}
    .nickline b{color:#ffd23f}
    .nickline span{cursor:pointer;text-decoration:underline;color:#ffd23f}
    .mapattr{font:500 10px Oswald,sans-serif;color:#7c84a0;margin-top:10px;opacity:.8}
    .srow{display:flex;align-items:center;justify-content:space-between;gap:10px;margin:12px 2px;
      font:500 15px Oswald,sans-serif;color:#e7e7ef}
    .srow label{display:flex;align-items:center;gap:8px;cursor:pointer}
    .srow input[type=range]{flex:1;max-width:150px;accent-color:#ffd23f}
    .srow input[type=checkbox]{width:20px;height:20px;accent-color:#ffd23f}
    #lbList{list-style:none;margin:0;padding:0;text-align:left;max-height:48vh;overflow:auto}
    #lbList li{display:flex;justify-content:space-between;gap:10px;padding:9px 12px;margin:5px 0;
      background:#20233a;border-radius:10px;font:500 16px Oswald,sans-serif;color:#fff}
    #lbList li .rk{color:#ffd23f;font-weight:700;width:26px}
    #lbList li .nm{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
    #lbList li .sc{color:#ffd23f;font-weight:700}
    #lbList li.me{outline:2px solid #ffd23f}
    #lbList li.empty{justify-content:center;color:#9aa3c7}
    #nickInput{width:100%;box-sizing:border-box;padding:13px;border-radius:11px;border:2px solid #3a3f63;
      background:#0e0f1c;color:#fff;font:700 18px Oswald,sans-serif;text-align:center;margin:6px 0}
    #nickInput:focus{outline:none;border-color:#ffd23f}
    .nerr{color:#ff6b6b;font:500 13px Oswald,sans-serif;min-height:16px;margin:2px 0 8px}
    .overScore{font:700 56px Oswald,sans-serif;color:#ffd23f;margin:6px 0;line-height:1}
    .deathmsg{font:500 14px Oswald,sans-serif;color:#cfd3e6;margin:6px 4px 14px;line-height:1.4}
  </style>
</head>
<body>
  <div id="map"></div>
  <canvas id="fx"></canvas>
  <div id="simmy"></div>
  <div id="hud"><b>🍟 0</b> &nbsp; ❤️❤️❤️</div>
  <div id="joy"></div>
  <div id="hint">drž a táhni = otoč pohled</div>
  <div id="eye" class="btn">👁</div>
  <div id="smaz" class="btn">🧀</div>
  <div id="fire" class="btn">🍟</div>
  <div id="err"></div>
  <div id="ver" style="position:fixed;right:8px;top:50px;z-index:9998;color:#fff;opacity:.5;font:bold 11px monospace;pointer-events:none;text-shadow:0 1px 2px #000">v98</div>

  <!-- ── MENU (titulka — hero artwork na pozadí) ── -->
  <div id="menu" class="overlay">
    <img class="heroImg" src="assets/menu_bg.png" alt="">
    <div class="heroScrim"></div>
    <div class="menuTop">
      <div class="kicker">GTA&nbsp;7</div>
      <h1 class="logo">TĚŠÍN&nbsp;CITY</h1>
      <div class="sub">🍟 Smažák s Hranolkama DLC 🧀</div>
    </div>
    <div class="menuBottom">
      <button id="playBtn" class="mbtn gold">▶ HRÁT</button>
      <div class="mrow">
        <button id="lbBtn" class="mbtn">🏆 TOP SMAŽKY</button>
        <button id="setBtn" class="mbtn">⚙️ NASTAVENÍ</button>
      </div>
      <div class="nickline">Hraješ jako <b id="nickLabel">—</b> <span id="nickChange">změnit</span></div>
      <div class="mapattr">🗺️ Mapa: © OpenStreetMap · OpenFreeMap</div>
    </div>
  </div>

  <!-- ── NASTAVENÍ ── -->
  <div id="settings" class="overlay">
    <div class="panel">
      <h2>⚙️ NASTAVENÍ</h2>
      <div class="srow"><label><input type="checkbox" id="musicOnCb"> 🎵 Hudba</label>
        <input type="range" id="musicVolSl" min="0" max="100"></div>
      <div class="srow"><label><input type="checkbox" id="sfxOnCb"> 🔊 Zvuky</label>
        <input type="range" id="sfxVolSl" min="0" max="100"></div>
      <button id="setClose" class="mbtn gold">HOTOVO</button>
    </div>
  </div>

  <!-- ── ŽEBŘÍČEK ── -->
  <div id="leaderboard" class="overlay">
    <div class="panel">
      <h2>🏆 TOP SMAŽKY</h2>
      <ol id="lbList"></ol>
      <button id="lbClose" class="mbtn gold">ZAVŘÍT</button>
    </div>
  </div>

  <!-- ── NICK ── -->
  <div id="nick" class="overlay">
    <div class="panel">
      <h2>ZADEJ NICK</h2>
      <input id="nickInput" maxlength="12" autocomplete="off" autocapitalize="off" placeholder="4–12 znaků">
      <div class="nerr" id="nickErr"></div>
      <button id="nickBtn" class="mbtn gold">▶ POKRAČOVAT</button>
    </div>
  </div>

  <!-- ── KONEC HRY ── -->
  <div id="over" class="overlay">
    <div class="panel">
      <h2>💀 KONEC</h2>
      <div class="overScore" id="overScore">0</div>
      <div class="deathmsg" id="deathMsg"></div>
      <button id="againBtn" class="mbtn gold">▶ HRÁT ZNOVU</button>
      <button id="menuBtn" class="mbtn">☰ MENU</button>
    </div>
  </div>

  <script src="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.js"></script>
  <script>
  const show = m => document.getElementById('err').textContent = m;
  try {
    const SPAWN = [18.6285, 49.7464];           // Český Těšín
    let lng = SPAWN[0], lat = SPAWN[1];
    const PITCH = 70, ZOOM = 20.6;   // vyšší náklon = pohled z 3. osoby (víc vidíš ulici před sebou)
    let bearing = 0;                            // mění "oko" (otáčení pohledu)

    const map = new maplibregl.Map({
      container: 'map',
      style: 'https://tiles.openfreemap.org/styles/liberty',
      center: SPAWN, zoom: ZOOM, pitch: PITCH, bearing: bearing, maxPitch: 75,
      interactive: false,                        // kameru řídíme my (honící)
      attributionControl: false,                 // ve hře skryté; kredit je v menu (licenčně stačí)
    });
    map.on('error', e => { show('map: ' + (e&&e.error&&e.error.message||'?'));
      clearTimeout(window._errT); window._errT=setTimeout(()=>show(''), 5000); });   // hláška sama zmizí

    // ── Měřítko: metry ↔ stupně ───────────────────────────────
    const MLAT = 111320;
    const mlng = la => 111320 * Math.cos(la*Math.PI/180);
    // vzdálenost dvou geo bodů v metrech (lokální rovinná aproximace)
    function distM(aLng,aLat,bLng,bLat){
      const dx = (aLng-bLng)*mlng((aLat+bLat)/2);
      const dy = (aLat-bLat)*MLAT;
      return Math.hypot(dx,dy);
    }
    // posuň geo bod o (east,north) metrů
    function moveGeo(o, eastM, northM){
      o.lat += northM/MLAT;
      o.lng += eastM/mlng(o.lat);
    }

    // ── Sprite knihovna ───────────────────────────────────────
    const SPRITES = {};
    function loadImg(key, src){ const im=new Image(); im.onload=()=>im._ok=true; im.src=src; SPRITES[key]=im; }
    // Animované postavy — 6-snímkové sprite sheety (assets/pohyblive_npc/), vyklíčované z magenty.
    const ANIM = {
      vietnamec:{frames:6,enemy:false},
      policajt :{frames:6,enemy:false},
      manazer  :{frames:6,enemy:false},
      ozrala   :{frames:6,enemy:false},
      dedek    :{frames:6,enemy:false},
      palkar   :{frames:6,enemy:true},
      fetak    :{frames:6,enemy:true},
    };
    const CIVIL = ['vietnamec','policajt','manazer','ozrala','dedek'];
    const ENEMY = ['palkar','fetak'];
    Object.keys(ANIM).forEach(k=>loadImg(k,'assets/pohyblive_npc/'+k+'.png'));
    // mobiliář / zeleň (props) — keř, strom, lampa, zastávka, kytky, koš, popelnice
    loadImg('strom','assets/props/strom_clean.png');
    ['ker','lampa','zastavka','kytky','kos','popelnice'].forEach(k=>loadImg(k,'assets/props/gen/'+k+'.png'));

    // ── Stav hry ──────────────────────────────────────────────
    let score = 0, lives = 3, hurtCd = 0, smazCd = 0, gameOver = false;
    const npcs = [], fries = [], smazaks = [], parts = [];
    const TAUNTS = ['Rozmrdám ti xicht!','Neutíkej ty sračko!','Ukradnu ti parno!','Postava jak rotoped more!'];
    const rnd = a => a[(Math.random()*a.length)|0];

    // ── NPC ───────────────────────────────────────────────────
    const NPC_MAX = 12;
    function spawnNpc(near){
      const ang = Math.random()*Math.PI*2;
      const r = near ? (60+Math.random()*120) : (25+Math.random()*110);
      const o = { lng, lat, dir: Math.random()*Math.PI*2, hit:0, flee:0, face:1, af: Math.random()*6 };
      moveGeo(o, Math.cos(ang)*r, Math.sin(ang)*r);
      const isEnemy = Math.random() < 0.45;
      o.enemy = isEnemy;
      o.hp = isEnemy ? 3 : 1;
      o.key = isEnemy ? rnd(ENEMY) : rnd(CIVIL);
      npcs.push(o);
    }
    function recycleNpc(o){
      const ang = Math.random()*Math.PI*2, r = 90+Math.random()*90;
      o.lng = lng; o.lat = lat; moveGeo(o, Math.cos(ang)*r, Math.sin(ang)*r);
      o.hp = o.enemy ? 3 : 1; o.hit=0; o.flee=0; o.dir=Math.random()*Math.PI*2;
    }

    // ── Props (zeleň + mobiliář) — rozmístěné dle povrchu mapy ──
    const props = [], PROP_MAX = 0;   // VYPNUTO — dekorace přegenerujeme (magenta zdroje)
    function surfaceAt(sx, sy){
      try{
        const f = map.queryRenderedFeatures([sx, sy]);
        let road=false, green=false;
        for(const ft of f){
          const id = ((ft.layer&&ft.layer.id)||'')+' '+(ft.sourceLayer||'');
          if(/building/.test(id)) return 'building';
          if(/(road|transport|bridge|tunnel|rail|path|pedestrian)/.test(id)) road=true;
          if(/(park|grass|wood|forest|green|garden|scrub|cemetery|pitch|golf|recreation|farmland)/.test(id)) green=true;
        }
        if(green) return 'green';
        if(road)  return 'road';
      }catch(e){}
      return 'other';
    }
    function scatterProps(){
      let tries=0;
      while(props.length<PROP_MAX && tries<14){
        tries++;
        const ang=Math.random()*Math.PI*2, r=30+Math.random()*160;
        const o={lng,lat}; moveGeo(o, Math.cos(ang)*r, Math.sin(ang)*r);
        const p=map.project([o.lng,o.lat]);
        if(p.x<10||p.x>innerWidth-10||p.y<10||p.y>innerHeight-10) continue;
        const surf=surfaceAt(p.x,p.y);
        if(surf==='building'||surf==='road') continue;
        o.key = (surf==='green') ? rnd(['strom','ker','ker','kytky','kytky','strom'])
                                 : rnd(['lampa','kos','popelnice','zastavka','ker']);
        props.push(o);
      }
      for(let i=props.length-1;i>=0;i--) if(distM(lng,lat,props[i].lng,props[i].lat)>250) props.splice(i,1);
    }

    // ── Particly (splat) ──────────────────────────────────────
    function boom(o, col, n){
      for(let i=0;i<n;i++){ const a=Math.random()*Math.PI*2, s=2+Math.random()*6;
        parts.push({ lng:o.lng, lat:o.lat, vx:Math.cos(a)*s, vy:Math.sin(a)*s, life:0.5, col }); }
    }
    let popMsg='', popT=0;
    const popup = m => { popMsg=m; popT=1.4; };

    // ── Házení ────────────────────────────────────────────────
    function nearestNpc(maxM){
      let best=null, bd=maxM;
      for(const o of npcs){ if(o.hp<=0)continue; const d=distM(lng,lat,o.lng,o.lat); if(d<bd){bd=d;best=o;} }
      return best;
    }
    let fireCd=0;
    function throwFry(){
      if(fireCd>0) return; fireCd=0.16;
      const t = nearestNpc(80);
      let th = bearing*Math.PI/180;            // default: kam koukáš
      let dirE, dirN;
      if(t){ const dx=(t.lng-lng)*mlng(lat), dy=(t.lat-lat)*MLAT; const l=Math.hypot(dx,dy)||1; dirE=dx/l; dirN=dy/l; }
      else { dirE=Math.sin(th); dirN=Math.cos(th); }
      fries.push({ lng, lat, vx:dirE*34, vy:dirN*34, life:1.1 });
      sfx('shoot',0.18);
    }
    function throwSmaz(){
      if(smazCd>0) return; smazCd=5;
      const t = nearestNpc(140);
      let dirE, dirN;
      if(t){ const dx=(t.lng-lng)*mlng(lat), dy=(t.lat-lat)*MLAT; const l=Math.hypot(dx,dy)||1; dirE=dx/l; dirN=dy/l; }
      else { const th=bearing*Math.PI/180; dirE=Math.sin(th); dirN=Math.cos(th); }
      smazaks.push({ lng, lat, vx:dirE*22, vy:dirN*22, life:1.6, t:0 });
      sfx('shoot',0.4);
    }
    function smazBoom(s){
      boom(s,'#f4c430',22); boom(s,'#e8a020',14); sfx('boom',0.7);
      for(const o of npcs){ if(o.hp>0 && distM(s.lng,s.lat,o.lng,o.lat)<14){
        score += o.enemy?20:8; o.hit=0.25; boom(o,'#f4c430',8); recycleNpc(o); } }
      updateHud();
    }

    function hudHearts(){ return '❤️'.repeat(Math.max(0,lives)) || '💀'; }
    function updateHud(){ document.getElementById('hud').innerHTML = '<b>🍟 '+score+'</b> &nbsp; '+hudHearts(); }

    function endGame(){
      gameOver=true; state='OVER'; document.body.classList.remove('playing');
      sfx('gameover'); submitScore(nick||'Anonym', score);
      $('overScore').textContent=score;
      $('deathMsg').textContent=DEATHS[(Math.random()*DEATHS.length)|0];
      $('over').classList.add('show'); setMusicVol();
    }

    // ── Ovládání ──────────────────────────────────────────────
    const keys = {};
    addEventListener('keydown', e => { keys[e.key.toLowerCase()] = true;
      if(state==='PLAYING'){ if(e.key===' '||e.key==='f') throwFry(); if(e.key==='e') throwSmaz(); } });
    addEventListener('keyup',   e => keys[e.key.toLowerCase()] = false);

    // plovoucí joystick (levá spodní část)
    let joy = null;
    const jz = document.getElementById('joy');
    jz.addEventListener('touchstart', e=>{ const t=e.changedTouches[0]; joy={ox:t.clientX,oy:t.clientY,dx:0,dy:0}; }, {passive:true});
    jz.addEventListener('touchmove',  e=>{ if(!joy)return; const t=e.changedTouches[0]; joy.dx=t.clientX-joy.ox; joy.dy=t.clientY-joy.oy; e.preventDefault(); }, {passive:false});
    const jEnd=()=>joy=null;
    jz.addEventListener('touchend',jEnd); jz.addEventListener('touchcancel',jEnd);

    // tlačítko hranolky — drž = pal
    const fireBtn=document.getElementById('fire');
    let firing=false;
    const fStart=e=>{ firing=true; fireBtn.classList.add('act'); e.preventDefault(); };
    const fStop =e=>{ firing=false; fireBtn.classList.remove('act'); };
    fireBtn.addEventListener('pointerdown',fStart); fireBtn.addEventListener('pointerup',fStop);
    fireBtn.addEventListener('pointercancel',fStop); fireBtn.addEventListener('pointerleave',fStop);
    // tlačítko smažák
    document.getElementById('smaz').addEventListener('pointerdown',e=>{ throwSmaz(); e.preventDefault(); });

    // "Oko" — drž a táhni = otoč kameru
    const eye = document.getElementById('eye');
    let eyeOn=false, eyeX=0, eyeBase=0;
    eye.addEventListener('pointerdown', e=>{ eyeOn=true; eyeX=e.clientX; eyeBase=bearing;
      eye.classList.add('act'); eye.setPointerCapture(e.pointerId); e.preventDefault(); e.stopPropagation(); });
    eye.addEventListener('pointermove', e=>{ if(!eyeOn)return; bearing=eyeBase+(e.clientX-eyeX)*0.6; e.preventDefault(); e.stopPropagation(); });
    const eyeUp = e=>{ if(!eyeOn)return; eyeOn=false; eye.classList.remove('act'); if(e)e.stopPropagation(); };
    eye.addEventListener('pointerup', eyeUp); eye.addEventListener('pointercancel', eyeUp);

    // ── Audio: hudba (mp3) + SFX (WebAudio; hlasitost i na iOS přes GainNode) ──
    let musicOn  = localStorage.getItem('smazak_musicOn') !== '0';
    let sfxOn    = localStorage.getItem('smazak_sfxOn')   !== '0';
    let musicVol = (+(localStorage.getItem('smazak_musicVol') ?? 70)) / 100;
    let sfxVol   = (+(localStorage.getItem('smazak_sfxVol')   ?? 85)) / 100;
    function saveAudio(){ localStorage.setItem('smazak_musicOn',musicOn?'1':'0');
      localStorage.setItem('smazak_sfxOn',sfxOn?'1':'0');
      localStorage.setItem('smazak_musicVol',Math.round(musicVol*100));
      localStorage.setItem('smazak_sfxVol',Math.round(sfxVol*100)); }
    const music = new Audio('assets/music.mp3'); music.loop=true;
    let actx=null, musicGain=null, musicStarted=false;
    const SFXBUF={}, SFX_NAMES=['click','shoot','hit','kill','pickup','hurt','boom','wave','gameover'];
    function setMusicVol(){ const base=(state==='PLAYING')?0.5:1.0; const v=musicOn?base*musicVol:0;
      if(musicGain) musicGain.gain.value=v; else music.volume=v; }
    function startMusic(){ if(musicStarted||!musicOn)return;
      music.play().then(()=>{musicStarted=true;setMusicVol();}).catch(()=>{}); }
    function initAudio(){
      if(actx){ if(actx.state==='suspended')actx.resume(); startMusic(); return; }
      try{ actx=new (window.AudioContext||window.webkitAudioContext)(); }catch(e){ return; }
      try{ const sn=actx.createMediaElementSource(music); musicGain=actx.createGain();
        sn.connect(musicGain); musicGain.connect(actx.destination); }catch(e){}
      SFX_NAMES.forEach(n=>fetch('assets/sfx/'+n+'.wav').then(r=>r.arrayBuffer())
        .then(b=>actx.decodeAudioData(b)).then(buf=>SFXBUF[n]=buf).catch(()=>{}));
      startMusic(); setMusicVol();
    }
    function sfx(name,vol=1){ if(!sfxOn||!actx)return; const buf=SFXBUF[name]; if(!buf)return;
      const src=actx.createBufferSource(); src.buffer=buf; src.playbackRate.value=0.92+Math.random()*0.16;
      const g=actx.createGain(); g.gain.value=vol*sfxVol; src.connect(g); g.connect(actx.destination); src.start(); }
    ['touchstart','mousedown','keydown'].forEach(ev=>addEventListener(ev,initAudio));

    // ── Nick + globální žebříček (Firebase RTDB) ──
    const DB_URL='https://smazkaxdddd-default-rtdb.europe-west1.firebasedatabase.app';
    let nick = localStorage.getItem('smazak_nick') || '';
    let lbCache=[]; try{ lbCache=JSON.parse(localStorage.getItem('smazak_lb')||'[]'); }catch(e){}
    function escapeHtml(s){ return String(s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c])); }
    function renderLb(){
      const lb=lbCache.slice(0,15);
      $('lbList').innerHTML = lb.length ? lb.map((e,i)=>
        '<li class="'+(e.name===nick?'me':'')+'"><span class="rk">'+(i+1)+'.</span><span class="nm">'+escapeHtml(e.name)+'</span><span class="sc">'+e.score+'</span></li>'
      ).join('') : '<li class="empty">Zatím nikdo. Buď první! 🍟</li>';
    }
    function refreshLb(){
      fetch(DB_URL+'/scores.json').then(r=>r.json()).then(data=>{
        const arr = data ? Object.values(data).filter(e=>e&&typeof e.score==='number')
          .map(e=>({name:String(e.name||'?').slice(0,12),score:e.score})) : [];
        arr.sort((a,b)=>b.score-a.score); lbCache=arr.slice(0,50);
        localStorage.setItem('smazak_lb',JSON.stringify(lbCache.slice(0,20)));
        if($('leaderboard').classList.contains('show')) renderLb();
      }).catch(()=>{});
    }
    function submitScore(name,sc){
      lbCache.push({name,score:sc}); lbCache.sort((a,b)=>b.score-a.score); lbCache=lbCache.slice(0,50);
      localStorage.setItem('smazak_lb',JSON.stringify(lbCache.slice(0,20)));
      fetch(DB_URL+'/scores.json',{method:'POST',headers:{'Content-Type':'application/json'},
        body:JSON.stringify({name,score:sc,ts:Date.now()})}).then(()=>setTimeout(refreshLb,600)).catch(()=>{});
    }

    // ── Stav hry + overlaye ──
    let state='MENU', pendingPlay=false;
    const DEATHS=['Zmlátili tě Morgoši a tvý parno je fuč.','Somrák ti vzal poslední hranolku. Konec.',
      'Skončil jsi pochcanej v křoví u Olzy.','Snědli tě hladový holubi. Trapný.'];
    function $(id){ return document.getElementById(id); }
    function hideOverlays(){ ['menu','settings','leaderboard','nick','over'].forEach(i=>$(i).classList.remove('show')); }
    function showMenu(){ state='MENU'; document.body.classList.remove('playing'); hideOverlays();
      $('nickLabel').textContent = nick || '—'; $('menu').classList.add('show'); setMusicVol(); }
    function openSettings(){ $('musicOnCb').checked=musicOn; $('sfxOnCb').checked=sfxOn;
      $('musicVolSl').value=Math.round(musicVol*100); $('sfxVolSl').value=Math.round(sfxVol*100);
      $('settings').classList.add('show'); }
    function openLb(){ renderLb(); refreshLb(); $('leaderboard').classList.add('show'); }
    function showNick(fromPlay){ pendingPlay=!!fromPlay; $('nickInput').value=nick; $('nickErr').textContent='';
      $('nick').classList.add('show'); setTimeout(()=>$('nickInput').focus(),60); }
    function submitNick(){ const v=$('nickInput').value.trim().replace(/\s+/g,'_').slice(0,12);
      if(v.length<4){ $('nickErr').textContent='Aspoň 4 znaky, bracho.'; return; }
      nick=v; localStorage.setItem('smazak_nick',v); $('nickLabel').textContent=nick;
      $('nick').classList.remove('show'); sfx('click');
      if(pendingPlay){ pendingPlay=false; startPlay(); } }
    function startPlay(){
      initAudio();
      if(!nick){ showNick(true); return; }
      score=0; lives=3; gameOver=false; hurtCd=0; smazCd=0; fireCd=0; popT=0; firing=false; joy=null;
      npcs.length=0; fries.length=0; smazaks.length=0; parts.length=0; props.length=0;
      lng=SPAWN[0]; lat=SPAWN[1]; bearing=0; facing=1;
      for(let i=0;i<NPC_MAX;i++) spawnNpc(false);
      updateHud(); hideOverlays(); document.body.classList.add('playing');
      state='PLAYING'; startMusic(); setMusicVol(); sfx('click');
    }
    // drátování tlačítek
    $('playBtn').addEventListener('click',()=>{ sfx('click'); startPlay(); });
    $('lbBtn').addEventListener('click',()=>{ sfx('click'); openLb(); });
    $('setBtn').addEventListener('click',()=>{ sfx('click'); openSettings(); });
    $('nickChange').addEventListener('click',()=>showNick(false));
    $('setClose').addEventListener('click',()=>{ sfx('click'); $('settings').classList.remove('show'); });
    $('lbClose').addEventListener('click',()=>{ sfx('click'); $('leaderboard').classList.remove('show'); });
    $('nickBtn').addEventListener('click',submitNick);
    $('nickInput').addEventListener('keydown',e=>{ if(e.key==='Enter')submitNick(); });
    $('againBtn').addEventListener('click',()=>{ sfx('click'); startPlay(); });
    $('menuBtn').addEventListener('click',()=>{ sfx('click'); showMenu(); });
    $('musicOnCb').addEventListener('change',()=>{ musicOn=$('musicOnCb').checked; if(musicOn)startMusic(); setMusicVol(); saveAudio(); });
    $('sfxOnCb').addEventListener('change',()=>{ sfxOn=$('sfxOnCb').checked; saveAudio(); if(sfxOn)sfx('click'); });
    $('musicVolSl').addEventListener('input',()=>{ musicVol=$('musicVolSl').value/100; setMusicVol(); saveAudio(); });
    $('sfxVolSl').addEventListener('input',()=>{ sfxVol=$('sfxVolSl').value/100; saveAudio(); });
    $('sfxVolSl').addEventListener('change',()=>sfx('click'));

    // ── Update logika ─────────────────────────────────────────
    const SPEED = 13;                           // m/s Šimmy (rychlejší chůze po zvětšených ulicích)
    let facing = 1, propTimer = 0, walkT = 0, walkFrame = 0;
    const simmyEl = document.getElementById('simmy');
    function update(dt){
      if(state==='MENU'){ bearing += dt*4; return; }   // titulka: pomalý nálet kamery
      if(state!=='PLAYING') return;
      if(fireCd>0) fireCd-=dt;
      if(smazCd>0){ smazCd-=dt; document.getElementById('smaz').classList.toggle('cd', smazCd>0); }
      if(hurtCd>0) hurtCd-=dt;
      if(popT>0) popT-=dt;

      // vstup → směr (relativně ke kameře dle bearing)
      let ix=0, iy=0;
      if(keys['a']||keys['arrowleft'])ix-=1; if(keys['d']||keys['arrowright'])ix+=1;
      if(keys['w']||keys['arrowup'])iy+=1;   if(keys['s']||keys['arrowdown'])iy-=1;
      if(joy){ const L=Math.hypot(joy.dx,joy.dy); if(L>10){ const m=Math.min(L,60)/60; ix+=joy.dx/L*m; iy-=joy.dy/L*m; } }
      const len=Math.hypot(ix,iy);
      if(len>0){
        if(ix>0.1)facing=1; else if(ix<-0.1)facing=-1;
        const th=bearing*Math.PI/180;
        const east  = ix*Math.cos(th)+iy*Math.sin(th);
        const north =-ix*Math.sin(th)+iy*Math.cos(th);
        const d=SPEED*dt*Math.min(1,len);
        lat += north*d/MLAT;
        lng += east*d/mlng(lat);
      }
      // animace chůze: při pohybu cykluj 8 snímků, v klidu stůj na 1. snímku
      if(len>0){ walkT+=dt; if(walkT>=0.08){ walkT-=0.08; walkFrame=(walkFrame+1)%8; } }
      else { walkFrame=0; walkT=0; }
      simmyEl.style.backgroundPositionX = (walkFrame*100/7)+'%';
      simmyEl.style.transform=`translate(-50%,-88%) scaleX(${facing})`;

      if(firing) throwFry();

      // props — doplňuj a uklízej cca 3×/s (queryRenderedFeatures je drahé)
      propTimer-=dt; if(propTimer<=0){ propTimer=0.3; scatterProps(); }

      // NPC
      while(npcs.length<NPC_MAX) spawnNpc(false);
      for(const o of npcs){
        if(o.hit>0) o.hit-=dt;
        o.af = (o.af||0) + dt*9;          // posun snímku chůze (~9 fps)
        const d = distM(lng,lat,o.lng,o.lat);
        if(d>260){ recycleNpc(o); continue; }
        let spd, dE, dN;
        if(o.flee>0){
          o.flee-=dt; spd=4.5;
          const dx=(o.lng-lng)*mlng(lat), dy=(o.lat-lat)*MLAT, l=Math.hypot(dx,dy)||1; dE=dx/l; dN=dy/l;
        } else if(o.enemy && d<55){
          spd=3.2;
          const dx=(lng-o.lng)*mlng(lat), dy=(lat-o.lat)*MLAT, l=Math.hypot(dx,dy)||1; dE=dx/l; dN=dy/l;
          if(d<3 && hurtCd<=0){
            lives--; hurtCd=1.2; updateHud(); boom({lng,lat},'#ff3b3b',10); popup('👊 Dostal ses!'); sfx('hurt',0.5);
            if(lives<=0) endGame();
          }
        } else {
          if(Math.random()<0.02) o.dir+=(Math.random()-0.5)*1.2;
          spd=1.3; dE=Math.cos(o.dir); dN=Math.sin(o.dir);
        }
        if(dE>0.1)o.face=1; else if(dE<-0.1)o.face=-1;
        moveGeo(o, dE*spd*dt, dN*spd*dt);
      }

      // hranolky
      for(const f of fries){
        f.life-=dt; moveGeo(f, f.vx*dt, f.vy*dt);
        for(const o of npcs){
          if(o.hp>0 && distM(f.lng,f.lat,o.lng,o.lat)<4){
            o.hp--; o.hit=0.3; f.life=0; boom(o,'#e8a020',7); sfx('hit',0.4);
            if(!o.enemy) o.flee=2.5;
            if(o.hp<=0){ score+=o.enemy?20:8; updateHud(); boom(o,'#f4c430',12); sfx('kill',0.5);
              popup(o.enemy?'🍟 '+rnd(TAUNTS):'🍟 Schytal hranolky!'); recycleNpc(o); }
            break;
          }
        }
      }
      for(let i=fries.length-1;i>=0;i--) if(fries[i].life<=0) fries.splice(i,1);

      // smažák
      for(const s of smazaks){
        s.life-=dt; s.t+=dt*8; moveGeo(s, s.vx*dt, s.vy*dt);
        const hit = npcs.some(o=>o.hp>0 && distM(s.lng,s.lat,o.lng,o.lat)<6);
        if(hit || s.life<=0){ smazBoom(s); s.dead=true; }
      }
      for(let i=smazaks.length-1;i>=0;i--) if(smazaks[i].dead||smazaks[i].life<=0) smazaks.splice(i,1);

      // particly
      for(const p of parts){ p.life-=dt; moveGeo(p, p.vx*dt, p.vy*dt); }
      for(let i=parts.length-1;i>=0;i--) if(parts[i].life<=0) parts.splice(i,1);
    }

    // ── Render FX overlay ─────────────────────────────────────
    const fx = document.getElementById('fx');
    const fctx = fx.getContext('2d');
    let dpr = Math.min(devicePixelRatio||1, 2);
    function sizeFx(){ dpr=Math.min(devicePixelRatio||1,2);
      fx.width=innerWidth*dpr; fx.height=innerHeight*dpr; fx.style.width=innerWidth+'px'; fx.style.height=innerHeight+'px';
      fctx.setTransform(dpr,0,0,dpr,0,0); }
    addEventListener('resize', sizeFx); sizeFx();

    // Základní velikosti (px) — výška NPC/props; reálně se násobí distScale (perspektiva).
    const HUMAN_H = 56;
    const PROP_PX = { strom:112, zastavka:60, lampa:100, ker:32, kytky:18, kos:28, popelnice:34 };
    const FRY_PX = 19, SMAZ_PX = 30, PART_R = 3.5;
    // perspektiva: blízko = větší, daleko = menší (dM = vzdálenost od hráče v metrech)
    const distScale = dM => Math.max(0.5, Math.min(1.18, 20/(14+dM*0.42)));

    function rrect(g,x,y,w,h,r){ g.beginPath();
      g.moveTo(x+r,y); g.arcTo(x+w,y,x+w,y+h,r); g.arcTo(x+w,y+h,x,y+h,r);
      g.arcTo(x,y+h,x,y,r); g.arcTo(x,y,x+w,y,r); g.closePath(); }

    // hranolky v červeném kornoutu (proceduální — žádné emoji)
    function drawFries(g,s){
      const w=s*0.8, h=s*0.8;
      g.lineWidth=Math.max(1,s*0.035); g.strokeStyle='#caa01a';
      g.fillStyle='#f6c945';
      for(let i=0;i<4;i++){ const x=(-0.3+i*0.2)*w, hh=h*(0.62+(i%2)*0.16);
        g.fillRect(x, -h*0.18-hh, w*0.12, hh); g.strokeRect(x, -h*0.18-hh, w*0.12, hh); }
      g.fillStyle='#d23b2b';                       // kornout
      g.beginPath(); g.moveTo(-w*0.46,-h*0.18); g.lineTo(w*0.46,-h*0.18);
      g.lineTo(w*0.3,h*0.5); g.lineTo(-w*0.3,h*0.5); g.closePath(); g.fill();
      g.fillStyle='#ee5544'; g.fillRect(-w*0.46,-h*0.22,w*0.92,h*0.1);
    }
    // smažák = smažený sýr (zlatá obalovaná placka + roztečený sýr)
    const SMAZ_SPECK=[[-.28,-.18],[.22,-.1],[-.12,.16],[.3,.12],[.02,-.04],[-.3,.06],[.14,.2]];
    function drawSmaz(g,s){
      const w=s, h=s*0.74, r=s*0.16;
      g.fillStyle='#ffd23f'; rrect(g,-w*0.34,-h*0.5-h*0.12,w*0.68,h*0.3,r*0.6); g.fill(); // sýr peek nahoře
      g.fillStyle='#d99a3a'; g.strokeStyle='#a8661c'; g.lineWidth=Math.max(1,s*0.05);
      rrect(g,-w/2,-h/2,w,h,r); g.fill(); g.stroke();                                     // obalovaná placka
      g.fillStyle='#b87a26';
      for(const sp of SMAZ_SPECK){ g.beginPath(); g.arc(sp[0]*w,sp[1]*h,s*0.045,0,7); g.fill(); }
      g.fillStyle='#ffcf3a'; rrect(g,-w*0.16,-h*0.14,w*0.32,h*0.26,s*0.05); g.fill();     // roztečený sýr uvnitř
    }

    function render(){
      fctx.clearRect(0,0,innerWidth,innerHeight);

      // stín + "stojíš tady" kroužek pod Šimmym (Šimmy = DOM img nad canvasem)
      const cx=innerWidth/2, cy=innerHeight/2;
      fctx.globalAlpha=0.32; fctx.fillStyle='#000';
      fctx.beginPath(); fctx.ellipse(cx, cy, 12, 5, 0, 0, Math.PI*2); fctx.fill();
      fctx.globalAlpha=0.5; fctx.strokeStyle='#ffd23f'; fctx.lineWidth=2;
      fctx.beginPath(); fctx.ellipse(cx, cy, 13, 6, 0, 0, Math.PI*2); fctx.stroke();
      fctx.globalAlpha=1;
      // zlatá šipka nad hlavou hráče = "tohle jsi ty" (odliší od NPC)
      const ay = cy - 64 - Math.sin(performance.now()/300)*3;   // jemně pulzuje
      fctx.fillStyle='#ffd23f'; fctx.strokeStyle='#1a1a2e'; fctx.lineWidth=1.5;
      fctx.beginPath(); fctx.moveTo(cx-7,ay); fctx.lineTo(cx+7,ay); fctx.lineTo(cx,ay+9); fctx.closePath();
      fctx.fill(); fctx.stroke();

      // props + NPC dohromady, seřazené dle vzdálenosti (vzdálené první = správné překrytí)
      const drawList=[];
      for(const o of props) drawList.push({o, hpx:(PROP_PX[o.key]||40), key:o.key, face:1, hit:0, prop:true});
      for(const o of npcs){ if(o.hp>0) drawList.push({o, hpx:HUMAN_H, key:o.key, face:o.face, hit:o.hit, enemy:o.enemy}); }
      drawList.sort((a,b)=>distM(lng,lat,b.o.lng,b.o.lat)-distM(lng,lat,a.o.lng,a.o.lat));

      for(const it of drawList){
        const o=it.o, p=map.project([o.lng,o.lat]);
        if(p.x<-90||p.x>innerWidth+90||p.y<-160||p.y>innerHeight+90) continue;
        const im=SPRITES[it.key];
        const dM=distM(lng,lat,o.lng,o.lat);
        const h=it.hpx * distScale(dM);   // perspektiva: daleko = menší
        const nf=(ANIM[it.key] && ANIM[it.key].frames) || 1;    // počet snímků (animace)
        const sw=(im && im._ok && im.naturalHeight) ? im.naturalWidth/nf : 0;   // šířka 1 snímku ve zdroji
        const w=(sw) ? h*(sw/im.naturalHeight) : h*0.4;
        // stín
        fctx.globalAlpha=0.26; fctx.fillStyle='#000';
        fctx.beginPath(); fctx.ellipse(p.x, p.y, Math.max(4,w*0.34), Math.max(2,w*0.14), 0, 0, Math.PI*2); fctx.fill();
        fctx.globalAlpha=1;
        if(im && im._ok){
          const fi = nf>1 ? (Math.floor(o.af||0)%nf) : 0;       // aktuální snímek chůze
          fctx.save(); fctx.translate(p.x,p.y); fctx.scale(it.face,1);
          fctx.globalAlpha = it.hit>0 ? (0.55+0.45*Math.random())
            : Math.max(0.55, Math.min(1, 1-(dM-28)*0.006));        // mlha do dálky = hloubka
          fctx.drawImage(im, fi*sw, 0, sw, im.naturalHeight, -w/2, -h, w, h); fctx.restore(); fctx.globalAlpha=1;
        } else if(!it.prop){
          fctx.fillStyle=it.enemy?'#c0392b':'#3a6ea5';
          fctx.fillRect(p.x-w*0.5, p.y-h, w, h);
        }
      }

      // particly
      for(const pt of parts){ const p=map.project([pt.lng,pt.lat]);
        fctx.globalAlpha=Math.max(0,Math.min(1,pt.life/0.5)); fctx.fillStyle=pt.col;
        fctx.beginPath(); fctx.arc(p.x,p.y,PART_R,0,Math.PI*2); fctx.fill(); }
      fctx.globalAlpha=1;

      // hranolky (proceduální kornout) — měřítko dle vzdálenosti
      for(const f of fries){ const p=map.project([f.lng,f.lat]);
        fctx.save(); fctx.translate(p.x,p.y); drawFries(fctx,FRY_PX*distScale(distM(lng,lat,f.lng,f.lat))); fctx.restore(); }
      // smažák (rotující smažený sýr)
      for(const sm of smazaks){ const p=map.project([sm.lng,sm.lat]);
        fctx.save(); fctx.translate(p.x,p.y); fctx.rotate(sm.t*0.5); drawSmaz(fctx,SMAZ_PX*distScale(distM(lng,lat,sm.lng,sm.lat))); fctx.restore(); }
      fctx.textAlign='center'; fctx.textBaseline='middle';

      // popup hláška nad Šimmym
      if(popT>0){ fctx.globalAlpha=Math.min(1,popT); fctx.font='bold 16px system-ui';
        fctx.fillStyle='#000'; fctx.fillText(popMsg, innerWidth/2+1, innerHeight/2-70+1);
        fctx.fillStyle='#ffd23f'; fctx.fillText(popMsg, innerWidth/2, innerHeight/2-70); fctx.globalAlpha=1; }

      // červený flash při zásahu hráče
      if(hurtCd>1.0){ fctx.fillStyle='rgba(255,0,0,'+((hurtCd-1.0)*0.8)+')'; fctx.fillRect(0,0,innerWidth,innerHeight); }
    }

    // ── Hlavní smyčka ─────────────────────────────────────────
    let last=performance.now();
    function frame(now){
      const dt=Math.min((now-last)/1000,0.05); last=now;
      update(dt);
      map.jumpTo({ center:[lng,lat], zoom:ZOOM, pitch:PITCH, bearing });
      render();
      requestAnimationFrame(frame);
    }

    // ── Stylizace: "kreslená realita" + víc barev ─────────────
    // ── Proceduální textury (tráva / asfalt / beton chodníku) ──
    // Generované na canvas → map.addImage. Žádné externí soubory ani licence.
    function texTile(size, draw){ const c=document.createElement('canvas'); c.width=c.height=size;
      const g=c.getContext('2d'); draw(g,size); return g.getImageData(0,0,size,size); }
    function makeTextures(){
      const S=64;
      try{ if(!map.hasImage('tex-grass')) map.addImage('tex-grass', texTile(S,(g,s)=>{
        g.fillStyle='#93c267'; g.fillRect(0,0,s,s);
        for(let i=0;i<420;i++){ const x=Math.random()*s,y=Math.random()*s,d=Math.random();
          g.fillStyle = d<0.5 ? 'rgba(70,120,55,0.55)' : 'rgba(180,210,130,0.45)';
          g.fillRect(x,y,1,1+Math.random()*2.5); }
      }), {pixelRatio:2}); }catch(e){}
      try{ if(!map.hasImage('tex-asphalt')) map.addImage('tex-asphalt', texTile(S,(g,s)=>{
        g.fillStyle='#565a66'; g.fillRect(0,0,s,s);
        for(let i=0;i<900;i++){ const x=Math.random()*s,y=Math.random()*s;
          g.fillStyle = Math.random()<0.5 ? 'rgba(255,255,255,0.045)' : 'rgba(0,0,0,0.11)';
          g.fillRect(x,y,1,1); }
      }), {pixelRatio:2}); }catch(e){}
      try{ if(!map.hasImage('tex-concrete')) map.addImage('tex-concrete', texTile(S,(g,s)=>{
        g.fillStyle='#dcd5c4'; g.fillRect(0,0,s,s);
        for(let i=0;i<520;i++){ const x=Math.random()*s,y=Math.random()*s;
          g.fillStyle='rgba(120,108,86,'+(Math.random()*0.10)+')'; g.fillRect(x,y,1,1); }
        g.strokeStyle='rgba(120,108,86,0.22)'; g.lineWidth=1;   // spáry dlažby
        g.beginPath(); g.moveTo(0,s/2); g.lineTo(s,s/2); g.moveTo(s/2,0); g.lineTo(s/2,s); g.stroke();
      }), {pixelRatio:2}); }catch(e){}
      // ── Fasády s okny (3 typy: činžák / cihla / panelák) pro fill-extrusion-pattern ──
      function facade(id, wall, frame, glass){ try{ if(map.hasImage(id))return; map.addImage(id, texTile(64,(g,s)=>{
        g.fillStyle=wall; g.fillRect(0,0,s,s);
        const m=9, gap=8, wW=(s-2*m-gap)/2, wH=(s-2*m-gap)/2;
        for(let r=0;r<2;r++)for(let c=0;c<2;c++){
          const x=m+c*(wW+gap), y=m+r*(wH+gap);
          g.fillStyle=frame; g.fillRect(x-2,y-2,wW+4,wH+4);
          g.fillStyle=glass[(r*2+c)%glass.length]; g.fillRect(x,y,wW,wH);
          g.fillStyle='rgba(255,255,255,0.14)'; g.beginPath(); g.moveTo(x,y); g.lineTo(x+wW*0.5,y); g.lineTo(x,y+wH*0.5); g.fill();
        }
      }), {pixelRatio:1}); }catch(e){} }
      facade('facade0','#cdbb9a','#7a6a52',['#34434e','#41525f','#2c3942','#536069']);   // béžový činžák, tmavá okna
      facade('facade1','#b06f52','#5a3a2c',['#e8c24a','#34434e','#e8c24a','#41525f']);   // cihla, část oken svítí
      facade('facade2','#a6abac','#5d6266',['#41525f','#536069','#34434e','#62727a']);   // šedý panelák
    }

    function stylize(){
      makeTextures();
      // zlatá hodina: modrá obloha → teplý zlatavý horizont (hloubka + vibe)
      try { map.setSky({ 'sky-color':'#83b4e6','horizon-color':'#f3d6a6','fog-color':'#ecdcc2',
        'sky-horizon-blend':0.72,'horizon-fog-blend':0.62 }); } catch(e){}
      // budovy: PLNÉ (neprůhledné) + PESTRÁ barva dle ID baráku (každý jiný, ne 2-3 dokola)
      const PAL=['#dcc7a4','#cdaa6e','#b9846a','#c2bcab','#a9b39a','#9fb0bb','#e0d2af','#c4895f','#b59f86','#d6b9d0'];
      const idx=['floor',['%',['abs',['to-number',['coalesce',['id'],['get','render_height'],['get','height'],7]]],10]];
      const col=['match', idx]; for(let i=0;i<PAL.length;i++) col.push(i, PAL[i]); col.push(PAL[0]);   // match → stringy bere jako barvy
      // (a) barevný základ — i fallback, kdyby okna selhala
      let done=false;
      ['building-3d','building-top','building'].forEach(id=>{
        if(map.getLayer(id)){ try{
          map.setPaintProperty(id,'fill-extrusion-color',col);
          map.setPaintProperty(id,'fill-extrusion-opacity',1);
          map.setPaintProperty(id,'fill-extrusion-vertical-gradient',true);
          done=true;
        }catch(e){} }
      });
      if(!done){ try{ map.addLayer({ id:'tst-3d', source:'openmaptiles','source-layer':'building',
        type:'fill-extrusion', minzoom:14, paint:{ 'fill-extrusion-color':col,
        'fill-extrusion-height':['coalesce',['get','render_height'],['get','height'],9],
        'fill-extrusion-base':['coalesce',['get','render_min_height'],['get','min_height'],0],
        'fill-extrusion-opacity':1 } }); }catch(e){} }
      // (b) OKNA: 3 typy fasád přes fill-extrusion-pattern (id%3). Přepínač — kdyby vypadalo blbě, dej false.
      const WINDOWS = true;
      if(WINDOWS && map.hasImage('facade0')){
        let added=0;
        for(let k=0;k<3;k++){ const lid='sim-bldg-'+k;
          if(map.getLayer(lid)){ added++; continue; }
          try{ map.addLayer({ id:lid, source:'openmaptiles','source-layer':'building',
            type:'fill-extrusion', minzoom:14,
            filter:['==',['%',['abs',['to-number',['coalesce',['id'],0]]],3],k],
            paint:{ 'fill-extrusion-pattern':'facade'+k,
              'fill-extrusion-height':['coalesce',['get','render_height'],['get','height'],9],
              'fill-extrusion-base':['coalesce',['get','render_min_height'],['get','min_height'],0],
              'fill-extrusion-opacity':1, 'fill-extrusion-vertical-gradient':true } });
            if(map.getLayer(lid)) added++;
          }catch(e){}
        }
        if(added===3){ ['building-3d','building-top','building','tst-3d'].forEach(id=>{
          if(map.getLayer(id)){ try{ map.setLayoutProperty(id,'visibility','none'); }catch(e){} } }); }
        // střešní čepice: tenký PLNÝ plát navrch budovy → zakryje okna na střeše
        if(!map.getLayer('sim-roof')){ try{ map.addLayer({ id:'sim-roof', source:'openmaptiles','source-layer':'building',
          type:'fill-extrusion', minzoom:14,
          paint:{ 'fill-extrusion-color':['match',['%',['abs',['to-number',['coalesce',['id'],0]]],3],0,'#6b665e',1,'#7a5f50',2,'#63676a','#6b665e'],
            'fill-extrusion-base':['coalesce',['get','render_height'],['get','height'],9],
            'fill-extrusion-height':['+',['coalesce',['get','render_height'],['get','height'],9],0.6],
            'fill-extrusion-opacity':1 } }); }catch(e){} }
        // ambient occlusion = stíny u paty/hran budov (hloubka). Když verze neumí, no-op.
        ['sim-bldg-0','sim-bldg-1','sim-bldg-2','sim-roof','building-3d'].forEach(id=>{ if(map.getLayer(id)){
          try{ map.setPaintProperty(id,'fill-extrusion-ambient-occlusion-intensity',0.45); }catch(e){}
          try{ map.setPaintProperty(id,'fill-extrusion-ambient-occlusion-radius',3.2); }catch(e){}
        }});
      }
      // pestřejší zem/zeleň/voda — projdi vrstvy a přebarvi dle typu
      try{
        const layers = map.getStyle().layers || [];
        for(const L of layers){
          const id=L.id, t=L.type;
          // ZEM = urbánní (dlažba/beton), ne zelená louka. Zeleň jen tam kde reálně je (parky).
          if(t==='background'){ try{ map.setPaintProperty(id,'background-color','#bcb6a8'); }catch(e){} }
          else if(/water/.test(id) && t==='fill'){ try{map.setPaintProperty(id,'fill-color','#7fc2e8');}catch(e){} }
          else if(/(residential|suburb|neighbourhood|built|urban|industrial|commercial|retail)/.test(id) && (t==='fill')){ try{
            map.setPaintProperty(id,'fill-color','#c2bcae');   // zastavěné plochy = městská zem
          }catch(e){} }
          else if(/(park|grass|wood|forest|green|garden|pitch|golf|cemetery|scrub|meadow|recreation)/.test(id) && t==='fill'){ try{
            map.setPaintProperty(id,'fill-color','#8bbf63');
            if(map.hasImage('tex-grass')) map.setPaintProperty(id,'fill-pattern','tex-grass');
          }catch(e){} }
          else if(/(sand|beach)/.test(id) && t==='fill'){ try{map.setPaintProperty(id,'fill-color','#f0e2b0');}catch(e){} }
        }
      }catch(e){}
      styleRoads();
      styleLabels();
    }

    // ── Popisky: bílé NÁZVY ulic podél silnice, SKRYTÁ čísla cest (shieldy) ──
    function styleLabels(){
      let layers=[]; try{ layers=map.getStyle().layers||[]; }catch(e){ return; }
      for(const L of layers){
        if(L.type!=='symbol') continue;
        const id=L.id;
        try{
          if(/shield/.test(id)){ map.setLayoutProperty(id,'visibility','none'); continue; }   // čísla silnic pryč
          if(/highway-name/.test(id) || L['source-layer']==='transportation_name'){
            map.setLayoutProperty(id,'visibility','visible');
            map.setLayoutProperty(id,'symbol-placement','line');
            map.setLayoutProperty(id,'text-field',['coalesce',['get','name'],['get','name:cs'],['get','name:latin'],'']);
            map.setLayoutProperty(id,'text-size',13);
            map.setPaintProperty(id,'text-color','#ffffff');
            map.setPaintProperty(id,'text-halo-color','#2b2b33');
            map.setPaintProperty(id,'text-halo-width',1.8);
          }
          else if(/poi/.test(id) || L['source-layer']==='poi'){            // cedule obchodů = vibe
            map.setLayoutProperty(id,'visibility','visible');
            map.setLayoutProperty(id,'text-size',12);
            map.setPaintProperty(id,'text-color','#3a2f24');
            map.setPaintProperty(id,'text-halo-color','#fbf3e2');
            map.setPaintProperty(id,'text-halo-width',1.7);
          }
        }catch(e){}
      }
    }

    // ── Silnice profi: tmavý asfalt + světlé chodníky (casing) + středové čáry ──
    // Šířky škálujeme až do zoomu 22 (orig. styl je stropuje na z20 → po přiblížení
    // by byly cesty tenké). [vozovka@z20, vozovka@z22, chodník@z20, chodník@z22]
    const RW = {
      motorway:[44,92,80,162], trunk:[42,86,76,152], secondary:[36,74,68,136],
      minor:[36,76,66,132], service:[24,50,46,92], link:[22,46,42,84],
    };
    function roadClass(id){
      if(/motorway/.test(id))return 'motorway';
      if(/trunk_primary/.test(id))return 'trunk';
      if(/secondary_tertiary/.test(id))return 'secondary';
      if(/service_track/.test(id))return 'service';
      if(/link/.test(id))return 'link';
      return 'minor';
    }
    const widthExpr=(a,b)=>['interpolate',['exponential',1.2],['zoom'],16,a*0.4,20,a,22,b];
    function styleRoads(){
      const ASPHALT='#565a66', SIDEWALK='#ddd6c6', PATH='#cdbfa6', LINE='#f4efe0';
      let layers=[]; try{ layers=map.getStyle().layers||[]; }catch(e){ return; }
      for(const L of layers){
        if(L.type!=='line' || L['source-layer']!=='transportation') continue;
        const id=L.id;
        if(/rail|hatching|waterway/.test(id)) continue;
        const c=RW[roadClass(id)];
        try{
          if(/casing/.test(id)){
            if(/path|pedestrian/.test(id)) continue;
            map.setPaintProperty(id,'line-color',SIDEWALK);        // chodník (fallback barva)
            if(map.hasImage('tex-concrete')) map.setPaintProperty(id,'line-pattern','tex-concrete');
            map.setPaintProperty(id,'line-width',widthExpr(c[2],c[3]));
          } else if(/path|pedestrian/.test(id)){
            map.setPaintProperty(id,'line-color',PATH);                // pěšina v trávě — širší
            if(map.hasImage('tex-concrete')) map.setPaintProperty(id,'line-pattern','tex-concrete');
            map.setPaintProperty(id,'line-width',widthExpr(16,34));
          } else {
            map.setPaintProperty(id,'line-color',ASPHALT);         // asfalt (fallback barva)
            if(map.hasImage('tex-asphalt')) map.setPaintProperty(id,'line-pattern','tex-asphalt');
            map.setPaintProperty(id,'line-width',widthExpr(c[0],c[1]));
          }
        }catch(e){}
      }
      // přerušované středové čáry na větších silnicích
      try{
        if(!map.getLayer('sim-centerline')){
          const before = map.getLayer('road_one_way_arrow') ? 'road_one_way_arrow' : undefined;
          map.addLayer({ id:'sim-centerline', type:'line', source:'openmaptiles', 'source-layer':'transportation',
            filter:['all',['==',['geometry-type'],'LineString'],
              ['match',['get','class'],['motorway','trunk','primary','secondary','tertiary'],true,false]],
            layout:{'line-cap':'butt','line-join':'round'},
            paint:{'line-color':LINE,'line-opacity':0.7,'line-dasharray':[2,3.5],
              'line-width':['interpolate',['exponential',1.2],['zoom'],16,0.5,20,2.4,22,5]} }, before);
        }
      }catch(e){}
    }

    map.on('load', ()=>{
      stylize();
      requestAnimationFrame(frame);
      showMenu();
    });
  } catch(e){ show('init: '+e.message); }
  </script>
  <script>
    // Auto-update: po nasazení nové verze se PWA sama refreshne (žádné ruční mazání cache).
    if ('serviceWorker' in navigator) {
      let reloaded = false;
      navigator.serviceWorker.addEventListener('controllerchange', () => {
        if (!reloaded) { reloaded = true; location.reload(); }
      });
      navigator.serviceWorker.register('sw.js').then(reg => {
        reg.update();
        setInterval(() => reg.update(), 60000);   // průběžně kontroluj novou verzi
        reg.addEventListener('updatefound', () => {
          const nw = reg.installing;
          if (nw) nw.addEventListener('statechange', () => {
            if (nw.state === 'installed' && navigator.serviceWorker.controller) location.reload();
          });
        });
      }).catch(() => {});
    }
  </script>
